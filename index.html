<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>吸入・点鼻指導ガイド</title>
    <!-- Google Fonts のみ外部依存可の要件 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 医療系の清潔感のある青 */
            --primary-color: #0277bd;
            --primary-dark: #01579b;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #546e7a;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            /* タップ時のハイライトを無効化（独自スタイルを適用するため） */
            -webkit-tap-highlight-color: transparent; 
            /* スワイプでのリロードなどを防止 */
            overscroll-behavior-y: none; 
        }

        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 24px;
            text-align: center;
            font-size: 32px; /* 高齢者向けに大きく */
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* パンくずリスト */
        .breadcrumbs {
            font-size: 22px;
            margin-bottom: 32px;
            color: var(--text-sub);
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        
        .breadcrumbs span.clickable {
            color: var(--primary-color);
            cursor: pointer;
            padding: 8px 0;
        }
        
        .breadcrumbs span.clickable:active {
            opacity: 0.6;
        }

        .breadcrumbs span.separator {
            margin: 0 16px;
            color: #95a5a6;
        }

        /* 画面セクション（フェードアニメーション） */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* グリッドレイアウト */
        .device-grid, .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 28px;
        }

        /* カードデザイン */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 36px 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            cursor: pointer;
            min-height: 160px; /* タッチ領域 60px以上を大きくクリア */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            border: 4px solid transparent;
            transition: all 0.2s ease;
            height: 100%;
            box-sizing: border-box;
        }

        .card:active {
            transform: scale(0.96);
            border-color: var(--primary-color);
            background: #f8fdff;
        }

        /* 画像・アイコンの高さ固定ラッパー */
        .card-img-wrapper {
            height: 140px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .card-icon {
            fill: var(--primary-color);
            width: 80px;
            height: 80px;
        }

        .device-image {
            max-width: 140px;
            max-height: 140px;
            object-fit: contain;
        }

        /* タイトルの高さ固定ラッパー (最大2行) */
        .card-title-wrapper {
            height: 76px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .card h2 {
            margin: 0;
            font-size: 26px;
            color: var(--primary-dark);
            line-height: 1.4;
        }

        .card p.drugs {
            font-size: 18px;
            color: var(--text-sub);
            margin: 0;
            line-height: 1.6;
            font-weight: 500;
        }

        /* ボタンデザイン */
        .btn-container {
            margin-top: 48px;
            text-align: center;
        }

        .btn {
            background-color: white;
            color: var(--primary-dark);
            border: 3px solid var(--primary-dark);
            border-radius: 12px;
            padding: 20px 56px;
            font-size: 26px;
            font-weight: 700;
            cursor: pointer;
            min-height: 80px; /* タッチ領域 60px以上 */
            min-width: 240px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }
        
        .btn:active {
            background-color: var(--primary-color);
            color: white;
            transform: scale(0.96);
        }

        .btn svg {
            margin-right: 16px;
            fill: currentColor;
        }

        /* 動画プレイヤー */
        .video-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 16px 32px rgba(0,0,0,0.2);
            aspect-ratio: 16 / 9; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        .error-message {
            display: none;
            background-color: #ffdde0;
            color: #b71c1c;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
            border: 3px solid #e53935;
        }

        /* 動画選択用アイコン */
        .video-card-icon {
            font-size: 56px;
            color: var(--primary-color);
            margin-bottom: 16px;
        }
        body.no-images .device-image, 
        body.no-images .card-icon { 
            display: none !important; 
        }

        .toggle-btn {
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid var(--primary-color);
            background: white;
            color: var(--primary-color);
            font-weight: bold;
            transition: all 0.2s;
        }
        .toggle-btn:active {
            background: var(--primary-color);
            color: white;
        }

        /* 設定画面用スタイル */
        .settings-item {
            display: flex;
            align-items: center;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            gap: 24px;
        }
        .settings-item-info {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .settings-item-name {
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-dark);
            margin: 0;
            line-height: 1.4;
        }
        .settings-item-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }
        .order-buttons {
            display: flex;
            gap: 12px;
        }
        .order-btn {
            background-color: var(--bg-color);
            border: 2px solid #ccc;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
            min-width: 100px;
        }
        .order-btn:hover:not(:disabled) {
            background-color: #e0e0e0;
        }
        .order-btn:active:not(:disabled) {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .order-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #eee;
        }
    </style>
</head>
<body>

<header>吸入・点鼻指導ガイド</header>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px;">
        <div class="breadcrumbs" id="breadcrumbs" style="margin-bottom: 0;"></div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button id="settingsBtn" class="toggle-btn" onclick="goToSettings()">表示順の設定</button>
            <button id="toggleImgBtn" class="toggle-btn" onclick="toggleImages()">画像なし表示</button>
            <button id="englishBtn" class="toggle-btn" onclick="window.open('https://jasweb.or.jp/en/inha/select_all.html', '_blank')" style="border-color: #546e7a; color: #546e7a;">🌐 English</button>
        </div>
    </div>

    <!-- Step 1: デバイス選択画面 -->
    <div id="step1" class="screen active">
        <div class="device-grid" id="deviceList"></div>
    </div>

    <!-- Step 2: 動画選択画面 -->
    <div id="step2" class="screen">
        <div class="video-grid" id="videoList"></div>
        <div class="btn-container">
            <button class="btn" onclick="goBackToStep1()">
                <svg viewBox="0 0 24 24" width="28" height="28"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                もどる
            </button>
        </div>
    </div>

    <!-- Step 3: 動画再生画面 -->
    <div id="step3" class="screen">
        <div id="errorMessage" class="error-message">動画ファイルが見つかりません。</div>
        <div class="video-wrapper">
            <!-- 該当の動画を自動再生し、ネイティブコントロールを表示 -->
            <video id="videoPlayer" controls playsinline>
                お使いのブラウザは動画の再生に対応していません。
            </video>
        </div>
        <div class="btn-container">
            <button class="btn" onclick="goBackToStep2()">
                <svg viewBox="0 0 24 24" width="28" height="28"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                もどる
            </button>
        </div>
    </div>

    <!-- Step 4: 設定画面 -->
    <div id="step4" class="screen">
        <h2 style="font-size: 28px; margin-bottom: 16px; color: var(--primary-dark);">キットの表示順設定</h2>
        <p style="font-size: 18px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.6;">「上へ」「下へ」ボタンを使用して、よく使うキットを上に移動させることができます。</p>
        <div id="settingsList" style="display: flex; flex-direction: column; gap: 16px;">
        </div>
        <div class="btn-container" style="display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-top: 36px;">
            <button class="btn" onclick="goBackToStep1FromSettings()" style="min-width: 240px; border-color: var(--primary-color);">
                保存してもどる
            </button>
            <button class="btn" onclick="resetSettings()" style="background-color: #fff; border-color: #e53935; color: #b71c1c; min-width: 200px; font-size: 22px;">
                初期状態に戻す
            </button>
        </div>
    </div>
</div>

<script>
// ---------- データ定義（8デバイス） ----------
// 出典：一般社団法人 日本喘息学会 公式MP4（https://jasweb.or.jp/video/）
const inhalerData = [
    {
        id: "ellipta",
        name: "エリプタ",
        drugs: "レルベア・テリルジー<br>アニュイティー、アノーロ他",
        img: "images/ellipta.png",
        videos: [
            { title: "使い方の手順", path: "https://jasweb.or.jp/video/movie/5_Ellipta_ver2.mp4" }
        ]
    },
    {
        id: "breezhaler",
        name: "ブリーズヘラー",
        drugs: "アテキュラ・エナジア 他",
        img: "images/breezhaler.png",
        videos: [
            { title: "使い方の手順", path: "https://jasweb.or.jp/video/movie/7_Breezhaler_ver2.mp4" }
        ]
    },
    {
        id: "diskus",
        name: "ディスカス",
        drugs: "フルタイド・セレベント・アドエア",
        img: "images/diskus.png",
        videos: [
            { title: "使い方の手順", path: "https://jasweb.or.jp/video/movie/4_Diskus_ver2.mp4" }
        ]
    },
    {
        id: "pmdi",
        name: "pMDI（エアゾール）",
        drugs: "フルティフォーム・ビレーズトリ<br>ビベスピ 他",
        img: "images/pmdi.png",
        videos: [
            { title: "使い方の手順", path: "https://jasweb.or.jp/video/movie/1A_Aerosol_body_ver2.mp4" }
        ]
    },
    {
        id: "turbuhaler_symbicort",
        name: "タービュヘイラー<br>（シムビコート）",
        drugs: "シムビコート",
        img: "images/turbuhaler_symbicort.png",
        videos: [
            { title: "前準備あり", path: "https://jasweb.or.jp/video/movie/6A_Symbicort_Turbuhaler_ver2.mp4" },
            { title: "毎日の吸入のみ", path: "https://jasweb.or.jp/video/movie/6A_Symbicort_Turbuhaler_ver2_short.mp4" }
        ]
    },

    {
        id: "respimat",
        name: "レスピマット",
        drugs: "スピリーバ・スピオルト",
        img: "images/respimat.png",
        videos: [
            { title: "前準備あり", path: "https://jasweb.or.jp/video/movie/2_Respimat_ver2.mp4" },
            { title: "毎日の吸入のみ", path: "https://jasweb.or.jp/video/movie/2_Respimat_Short_ver2.mp4" }
        ]
    },

    {
        id: "inavir",
        name: "イナビル",
        drugs: "イナビル",
        img: "images/inavir.png",
        videos: [
            { title: "使い方の手順", path: "https://jasweb.or.jp/video/movie/13_Inavir_ver2.mp4" }
        ]
    },
    {
        id: "ho",
        name: "ホー吸入",
        drugs: "吸入時のベストな舌の位置",
        img: "images/ho.png",
        videos: [
            { title: "ホー吸入 Ver.3", path: "https://jasweb.or.jp/video/movie/HowToHoh_2023_JP_edit04_nouhin.mp4" }
        ]
    },
    {
        id: "nasonex",
        name: "ナゾネックス点鼻液",
        drugs: "モメタゾン点鼻液",
        img: "images/nasonex.png",
        videos: [
            { title: "使い方の手順", path: "https://www.kyorin-pharm.co.jp/ethical/v/nasonex/nasonex_instruction_mv.mp4" }
        ]
    },
    {
        id: "allermist",
        name: "アラミスト点鼻液",
        drugs: "フルチカゾンフランカルボン酸点鼻",
        img: "images/allermist.png",
        videos: [
            { title: "使い方の手順", path: "https://videos.gskstatic.com/pharma/Health/Japan/allermist/detail/allermist_for-users.mp4" }
        ]
    },
    {
        id: "erizas",
        name: "エリザス点鼻粉末",
        drugs: "エリザス",
        img: "images/erizas.png",
        videos: [
            { title: "使い方の手順<br>（音声なし）", path: "erizas.mp4" }
        ]
    }
];

// 医療系十字アイコン (インラインSVG)
const deviceIconTemplate = `
<svg class="card-icon" viewBox="0 0 24 24" width="64" height="64">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4-9h-3V8h-2v3H8v2h3v3h2v-3h3v-2z"/>
</svg>
`;

// ---------- 状態管理 ----------
let currentDevice = null;
let currentVideo = null;
let showImages = true;
let orderConfig = [];

function loadOrder() {
    const saved = localStorage.getItem('inhaler_device_order');
    if (saved) {
        orderConfig = JSON.parse(saved);
        // 新しいキットが追加されていた場合に補完する
        inhalerData.forEach(d => {
            if (!orderConfig.includes(d.id)) {
                orderConfig.push(d.id);
            }
        });
    } else {
        orderConfig = inhalerData.map(d => d.id);
    }
}

function toggleImages() {
    showImages = !showImages;
    const btn = document.getElementById('toggleImgBtn');
    if (!showImages) {
        document.body.classList.add('no-images');
        btn.innerText = '画像あり表示に戻す';
    } else {
        document.body.classList.remove('no-images');
        btn.innerText = '画像なし（リスト）表示';
    }
}

// ---------- UI要素の取得 ----------
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const step4 = document.getElementById('step4');
const deviceList = document.getElementById('deviceList');
const videoList = document.getElementById('videoList');
const videoPlayer = document.getElementById('videoPlayer');
const errorMessage = document.getElementById('errorMessage');
const breadcrumbs = document.getElementById('breadcrumbs');

// ---------- 初期化処理 ----------
function init() {
    loadOrder();
    renderDevices();
    updateContext('top');
}

// ---------- Step 1: デバイス一覧の描画 ----------
window.fallbackSVG = deviceIconTemplate;

function renderDevices() {
    deviceList.innerHTML = '';
    
    // カスタム順序に基づいてソート
    const sortedData = [...inhalerData].sort((a, b) => {
        let idxA = orderConfig.indexOf(a.id);
        let idxB = orderConfig.indexOf(b.id);
        if(idxA === -1) idxA = 999;
        if(idxB === -1) idxB = 999;
        return idxA - idxB;
    });

    sortedData.forEach(device => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => selectDevice(device);
        
        // 画像読み込みエラー時には window.fallbackSVG を利用して十字アイコンを表示する
        card.innerHTML = `
            <div class="card-img-wrapper">
                <img src="${device.img}" class="device-image" alt="${device.name}" onerror="this.outerHTML=window.fallbackSVG" />
            </div>
            <div class="card-title-wrapper">
                <h2>${device.name}</h2>
            </div>
            <p class="drugs">${device.drugs}</p>
        `;
        deviceList.appendChild(card);
    });
}

// ---------- Step 2: 動画選択に進む ----------
function selectDevice(device) {
    currentDevice = device;
    videoList.innerHTML = '';
    
    device.videos.forEach(video => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => selectVideo(video);
        
        card.innerHTML = `
            <div class="card-img-wrapper" style="height:auto; min-height:80px">
                <div class="video-card-icon">▶️</div>
            </div>
            <div class="card-title-wrapper" style="height:auto">
                <h2>${video.title}</h2>
            </div>
        `;
        videoList.appendChild(card);
    });
    
    transitionTo(step2);
    updateContext('device');
}

// ---------- Step 3: 動画再生に進む ----------
function selectVideo(video) {
    if (!video.path.toLowerCase().endsWith('.mp4')) {
        window.open(video.path, '_blank', 'noopener,noreferrer');
        return;
    }

    currentVideo = video;
    
    // エラーメッセージをリセット
    errorMessage.style.display = 'none';
    
    // 先に画面を表示状態にする（display:noneのままだと再生がブロックされる場合があるため）
    transitionTo(step3);
    updateContext('video');
    
    // 動画のセットと再生
    videoPlayer.src = video.path;
    videoPlayer.load();
    
    const playPromise = videoPlayer.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.log("再生エラー・自動再生ブロック: ", error);
        });
    }
}

// ---------- ユーティリティ・画面遷移 ----------
function transitionTo(targetStep) {
    // 全て非表示
    [step1, step2, step3, step4].forEach(s => {
        s.classList.remove('active');
    });
    
    // アニメーションのリセットのためにリフロー強制
    void targetStep.offsetWidth; 
    
    // 表示してアニメーション開始
    targetStep.classList.add('active');
    
    // 各画面遷移時は先頭へスクロール
    window.scrollTo({ top: 0, behavior: 'instant' });
}

function goBackToStep1() {
    stopVideo();
    currentDevice = null;
    transitionTo(step1);
    updateContext('top');
}

function goBackToStep2() {
    stopVideo();
    currentVideo = null;
    transitionTo(step2);
    updateContext('device');
}

function stopVideo() {
    if (!videoPlayer.paused) {
        videoPlayer.pause();
    }
    // 仕様通り、画面遷移時にsrcをクリアする
    videoPlayer.removeAttribute('src'); 
    videoPlayer.load();
}

// ---------- イベントリスナー ----------

// 動画読み込みエラー時
videoPlayer.addEventListener('error', function(e) {
    console.error("Video Error: ", videoPlayer.error);
    // ネットワークエラー等でファイルが見つからない・再生できない場合
    errorMessage.innerHTML = `動画ファイルが見つかりません。<br><span style="font-size:16px;">（${currentVideo ? currentVideo.path : ''} が正しいフォルダに配置されているか確認してください）</span>`;
    errorMessage.style.display = 'block';
});

// ---------- 設定画面ロジック ----------
function goToSettings() {
    renderSettings();
    transitionTo(step4);
    updateContext('settings');
}

function renderSettings() {
    const list = document.getElementById('settingsList');
    list.innerHTML = '';
    
    // 現在のorderConfigに基づいてソート
    const sortedData = [...inhalerData].sort((a, b) => {
        let idxA = orderConfig.indexOf(a.id);
        let idxB = orderConfig.indexOf(b.id);
        if(idxA === -1) idxA = 999;
        if(idxB === -1) idxB = 999;
        return idxA - idxB;
    });

    sortedData.forEach((device, index) => {
        const item = document.createElement('div');
        item.className = 'settings-item';
        
        const isFirst = index === 0;
        const isLast = index === sortedData.length - 1;

        // 画像取得（エラーの場合はインラインSVGを表示しないように代替なしにしているが、Step1に合わせることも可能。ここではシンプルに空に。）
        item.innerHTML = `
            <div class="settings-item-info">
                <img src="${device.img}" class="settings-item-img" onerror="this.src=''" alt="" />
                <h3 class="settings-item-name">${device.name.replace('<br>', ' ')}</h3>
            </div>
            <div class="order-buttons">
                <button class="order-btn" onclick="moveDevice('${device.id}', -1)" ${isFirst ? 'disabled' : ''}>↑上へ</button>
                <button class="order-btn" onclick="moveDevice('${device.id}', 1)" ${isLast ? 'disabled' : ''}>↓下へ</button>
            </div>
        `;
        list.appendChild(item);
    });
}

function moveDevice(id, direction) {
    const index = orderConfig.indexOf(id);
    if (index === -1) return;
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= orderConfig.length) return;
    
    // 入れ替え
    const temp = orderConfig[index];
    orderConfig[index] = orderConfig[newIndex];
    orderConfig[newIndex] = temp;
    
    renderSettings(); // リストを再描画
}

function goBackToStep1FromSettings() {
    localStorage.setItem('inhaler_device_order', JSON.stringify(orderConfig));
    renderDevices(); // トップ画面を新しい順序で再描画
    transitionTo(step1);
    updateContext('top');
}

function resetSettings() {
    if(!confirm("設定を初期状態（デフォルトの順番）に戻しますか？")) return;
    orderConfig = inhalerData.map(d => d.id);
    localStorage.removeItem('inhaler_device_order');
    renderSettings();
}

// パンくずリスト更新
function updateContext(state) {
    let bcHTML = '';
    
    if (state === 'top') {
        bcHTML = `<span>トップ (吸入器・点鼻薬を選ぶ)</span>`;
    } 
    else if (state === 'device') {
        bcHTML = `
            <span class="clickable" onclick="goBackToStep1()">トップ</span>
            <span class="separator">/</span>
            <span>${currentDevice.name.replace('<br>', ' ')}</span>
        `;
    } 
    else if (state === 'video') {
        bcHTML = `
            <span class="clickable" onclick="goBackToStep1()">トップ</span>
            <span class="separator">/</span>
            <span class="clickable" onclick="goBackToStep2()">${currentDevice.name.replace('<br>', ' ')}</span>
            <span class="separator">/</span>
            <span>動画再生</span>
        `;
    }
    else if (state === 'settings') {
        bcHTML = `
            <span class="clickable" onclick="goBackToStep1FromSettings()">トップ</span>
            <span class="separator">/</span>
            <span>表示順の設定</span>
        `;
    }
    
    breadcrumbs.innerHTML = bcHTML;
}

// Android / iPad等でダブルタップズームを防止
document.addEventListener('dblclick', function(event) {
    event.preventDefault();
}, { passive: false });

// DOM読み込み完了時に初期化
document.addEventListener('DOMContentLoaded', init);

</script>
